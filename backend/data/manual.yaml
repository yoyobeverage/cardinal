    protocol: Maple Finance
    product: High Yield Secured Pool
    category: institutional_lending
    chains: [ethereum]
    current_apy: 11.2
    tvl_usd: 95000000
    audit_count: 3
    audit_firms: [trail_of_bits, peckshield, three_sigma]
    max_drawdown_1y: 0.03
    lockup_days: 30
    launched_at: 2024-04-15
    tax_treatment: ordinary_income
    yield_source_mix:
      lending_spread: 1.0
